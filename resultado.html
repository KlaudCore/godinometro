<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godinómetro | Resultado</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<main class="landing">
    <section class="hero">

        <span class="version">🏆 Resultado</span>
        <h1>Tu nivel Godín</h1>
        <p class="subtitle">Este es tu diagnóstico corporativo.</p>

        <div class="share-wrapper">
            <div class="hero-card result-card" id="result-card">
                <div id="trophy-animation"></div>
                <h2 id="godin-level">Calculando...</h2>
                <div class="score">
                    <span id="score">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="result-progress"></div>
                </div>
                <div class="badges">
                    <h3>Tus habilidades</h3>
                    <div id="badges-container"></div>
                </div>
                <div class="quote">
                    <p id="godin-message"></p>
                </div>
                <div class="code">
                    Código: <strong id="result-code"></strong>
                </div>
            </div>
        </div>

        <div class="botones-container">
            <!-- Aquí el onclick llama a downloadResult que está en results.js -->
            <button class="btn-start btn-small" id="btn-descargar" onclick="downloadResult()">📸 Descargar resultado</button>
            <button class="btn-secondary btn-small" onclick="shareLinkedin()">💼 Compartir en LinkedIn</button>
        </div>

        <br>
        <a href="index.html" class="back">← Volver al inicio</a>

    </section>
</main>

<footer>
    <p>☕ Godinómetro v1.0</p>
</footer>

<!-- ORDEN CORRECTO DE SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
<script src="js/results.js"></script>
<script src="js/share.js"></script>

</body>
</html>
